version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: task_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ahalya
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    image: taskmanagement-app
    container_name: task_app
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ahalya

volumes:
  mysql_data: